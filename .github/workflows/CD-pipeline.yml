name: CD

on:
  # Run AFTER CI completes
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  cd:
    # Only run if:
    # - CI succeeded
    # - It was triggered from main branch
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io

    steps:
      # 1) Checkout exact commit that CI tested
      - name: 1) Checkout commit from CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 2) Convert repository name to lowercase (Docker requirement)
      - name: 2) Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 3) Login to GitHub Container Registry
      - name: 3) Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4) Build Docker image (latest + commit SHA)
      - name: 4) Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }} \
            .

      # 5) Push Docker image
      - name: 5) Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}

      # 6) Deploy placeholder
      - name: 6) Deploy application
        run: |
          echo "Deploy step goes here"