name: CD

on:
  # Run AFTER CI completes
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  cd:
    # Only run if:
    # - CI succeeded
    # - It was triggered from main branch
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io

    steps:
      # 1) Checkout exact commit that passed CI
      - name: 1) Checkout commit from CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 2) Convert repository name to lowercase (Docker requires lowercase image names)
      - name: 2) Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 3) Login to GitHub Container Registry (GHCR)
      # Using GH_TOKEN (custom PAT) OR switch to secrets.GITHUB_TOKEN if preferred
      - name: 3) Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      # 4) Build Docker image (tagged as latest + commit SHA for rollback support)
      - name: 4) Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }} \
            .

      # 5) Push Docker image to GHCR
      - name: 5) Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}

      # 6) (Optional) Placeholder for infrastructure deployment (VPS / Kubernetes / etc.)
      - name: 6) Deploy application (placeholder)
        run: |
          echo "Infrastructure deployment step would go here."

      # 7) Trigger Vercel production deployment via Deploy Hook
      - name: 7) Trigger Vercel deployment
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"