name: CI

on:
  # Run on every push to main and every PR
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "20"

    steps:
      # 1) Checkout repository
      - name: 1) Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Node.js environment
      - name: 2) Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # 3) Install dependencies (deterministic)
      - name: 3) Install dependencies
        run: npm ci

      # 4) Run unit tests (quality gate)
      - name: 4) Run unit tests (Jest)
        run: npm test -- --watchAll=false

      # 5) Build production version
      - name: 5) Build production build
        run: npm run build

      # 6) Verify Dockerfile builds (no push)
      - name: 6) Docker build smoke test
        run: docker build -t portfolio:ci .